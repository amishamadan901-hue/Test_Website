<!DOCTYPE html>
<html>
<head>
    <title>Button Click Example</title>
</head>
<body>

    <button onclick="showMessage()">Click Me</button>

    <p id="result"></p>

    <script>
        function showMessage() {
            document.getElementById("result").innerText = "Button Clicked!";
        }
    </script>

</body>
</html>
